name: CodeQL

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'bin/**'
      - 'package.json'
  pull_request:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'bin/**'
      - 'package.json'
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC — weekly security scan
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Skip the 45MB generated client.ts — it's auto-generated from
          # Microsoft's OpenAPI spec, and CodeQL flags on it are upstream
          # concerns, not actionable here.
          config: |
            paths-ignore:
              - src/generated/**
              - node_modules/**
              - dist/**
              - coverage/**
              - test/**
              - src/**/__tests__/**

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
