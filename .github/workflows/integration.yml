name: Integration

# Full integration test tier: Testcontainers-backed Postgres + Redis via
# Phase 6 plan 06-05 globalSetup; plus Tier B tests (pg-mem + ioredis-mock,
# no Docker dep). Also runs the D-10 OAuth-surface coverage gate
# (bin/check-oauth-coverage.mjs) to enforce ≥70% on src/server.ts OAuth lines.

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  MS365_MCP_FULL_COVERAGE: '1'
  MS365_MCP_USE_SNAPSHOT: '1'
  MS365_MCP_ACCEPT_BETA_CHURN: '1'
  MS365_MCP_INTEGRATION: '1'
  NODE_OPTIONS: --max-old-space-size=12288

jobs:
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache generated Graph client
        id: gen-cache
        uses: actions/cache@v4
        with:
          path: src/generated/client.ts
          key: gen-${{ hashFiles('src/endpoints.json', 'src/presets/**/*.json', 'openapi/**/*.yaml', 'openapi/**/*.yml', 'bin/.last-*-snapshot.json', 'bin/generate-graph-client.mjs', 'bin/modules/**/*.mjs', 'package-lock.json') }}

      - name: Generate Graph client (full coverage)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: npm run generate

      - name: Run integration tests
        run: npm test
        # Integration suite: Testcontainers starts ephemeral Postgres 16 + Redis 7
        # in the GitHub Actions runner; Tier B tests use pg-mem + ioredis-mock.

      - name: Upload integration-test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs-${{ github.sha }}
          path: |
            /tmp/testcontainers-*.log
            coverage/
          retention-days: 7
          if-no-files-found: ignore

  oauth-coverage-gate:
    name: OAuth-surface coverage gate (D-10)
    runs-on: ubuntu-latest
    needs: integration
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache generated Graph client
        id: gen-cache
        uses: actions/cache@v4
        with:
          path: src/generated/client.ts
          key: gen-${{ hashFiles('src/endpoints.json', 'src/presets/**/*.json', 'openapi/**/*.yaml', 'openapi/**/*.yml', 'bin/.last-*-snapshot.json', 'bin/generate-graph-client.mjs', 'bin/modules/**/*.mjs', 'package-lock.json') }}

      - name: Generate Graph client (full coverage)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: npm run generate

      - name: Run coverage over OAuth-surface integration tests
        run: npx vitest run test/integration/oauth-surface --coverage

      - name: Enforce ≥70% line coverage on OAuth handlers
        run: node bin/check-oauth-coverage.mjs

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oauth-coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore
