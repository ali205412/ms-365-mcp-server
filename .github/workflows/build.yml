name: Build

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Phase 5/5.1: full Graph v1.0 + beta + 5 product catalogs; snapshot pinned
  # for reproducible CI; accept upstream beta churn so minor upstream
  # renamings don't break PRs (churn is reviewed on snapshot refresh).
  MS365_MCP_FULL_COVERAGE: '1'
  MS365_MCP_USE_SNAPSHOT: '1'
  MS365_MCP_ACCEPT_BETA_CHURN: '1'
  # Generated client.ts is ~46MB; default heap OOMs on tsup + vitest.
  NODE_OPTIONS: --max-old-space-size=12288

jobs:
  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    # 35 min — leaves headroom for install (~6 min), generate full-coverage
    # (~7 min), TypeScript build (~1 min), and the full unit test tier
    # (~13 min after 2026-04-24 unquarantine of the 13 previously-flaky
    # files). Prior 20-min budget was tight only because the quarantine
    # was skipping tests; see commit retiring CI_FLAKY_QUARANTINE.
    timeout-minutes: 35

    # Single Node 22 — production target is node:22-alpine in the
    # Dockerfile release stage. Multi-version matrix (20 + 22) was
    # doubling cost without catching anything Docker wouldn't.

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install patch-package (if needed)
        run: npm i -D patch-package

      - name: Install dependencies
        run: npm ci

      # Cache the 72MB generated/client.ts. Key derives from every input
      # that could change the output: the curated catalog metadata
      # (endpoints.json), the pinned upstream OpenAPI snapshots
      # (bin/.last-*-snapshot.json), the generator source
      # (bin/generate-graph-client.mjs + bin/modules/**), and the
      # lockfile (changes to openapi-zod-client / zod). Misses cause a
      # full ~7-min regenerate; hits skip the step entirely.
      - name: Cache generated Graph client
        id: gen-cache
        uses: actions/cache@v4
        with:
          path: src/generated/client.ts
          key: gen-${{ hashFiles('src/endpoints.json', 'bin/.last-*-snapshot.json', 'bin/generate-graph-client.mjs', 'bin/modules/**/*.mjs', 'package-lock.json') }}

      - name: Generate Graph client (full coverage)
        if: steps.gen-cache.outputs.cache-hit != 'true'
        run: npm run generate

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build TypeScript
        run: npm run build

      # PR runs: only test files affected by the changeset. Push runs to
      # `dev` (this workflow's only push trigger) and main run the full
      # suite via Integration/Release workflows.
      - name: Run unit tests (full)
        if: github.event_name != 'pull_request'
        run: npm test

      - name: Run unit tests (related to PR changes only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=50 origin "${GITHUB_BASE_REF}"
          changed=$(git diff --name-only "origin/${GITHUB_BASE_REF}"...HEAD -- '*.ts' '*.mts' '*.tsx' '*.js' '*.mjs' | tr '\n' ' ')
          if [ -z "$changed" ]; then
            echo "No source changes vs base — skipping unit tests"
            exit 0
          fi
          echo "Running vitest related on: $changed"
          npx vitest run --changed "origin/${GITHUB_BASE_REF}" || npx vitest related --run $changed

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
