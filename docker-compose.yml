# Reference Docker Compose stack (plan 03-01).
#
# Single-VM deployment target per PROJECT.md constraint. Postgres is the
# durable tenant registry / audit log; the mcp service auto-runs migrations
# on startup unless MS365_MCP_MIGRATE_ON_STARTUP=0 is passed (see
# docker-entrypoint.sh). Port 5432 is bound to 127.0.0.1 so the database
# is not publicly exposed; operators intentionally running multi-VM deploys
# should swap the bind address and use a reverse proxy.
#
# Sibling plans 03-02 + 03-04 will layer Redis + KEK secret mounting onto
# this file. `version:` is deliberately omitted — Compose v2 (docker CLI
# plugin) ignores it and warns if present.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcp
      # CR-04 fix: no default — Compose fails fast (Postgres image refuses to
      # start without POSTGRES_PASSWORD) when the operator has not generated a
      # strong password. Generate one with: openssl rand -base64 32
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env - generate with openssl rand -base64 32}'
      POSTGRES_DB: mcp
    volumes:
      - mcp_pg_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mcp -d mcp']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # AOF persistence keeps PKCE state + MSAL cache across restarts. Disable via
    # operator override if the deployment is strictly ephemeral.
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - mcp_redis_data:/data
    # Bind to 127.0.0.1 only — same-host access. For multi-host deploys, swap
    # the bind address and enforce rediss:// + requirepass (see runbook).
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  mcp:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # CR-04 fix: no :-changeme default — same fail-fast guard as the
      # postgres service so a misconfigured deployment never boots with a
      # known-weak password. For cross-VM Postgres (i.e., when this compose
      # service is replaced by an external host), append `?sslmode=require`
      # to the URL: postgres://mcp:PASSWORD@host:5432/mcp?sslmode=require
      MS365_MCP_DATABASE_URL: 'postgres://mcp:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/mcp'
      MS365_MCP_MIGRATE_ON_STARTUP: ${MS365_MCP_MIGRATE_ON_STARTUP:-1}
      MS365_MCP_REDIS_URL: redis://redis:6379
      # Phase 6: enable Prometheus /metrics on port 9464 (D-02 Bearer auth
      # is optional — unset env var = open endpoint, suitable for localhost).
      MS365_MCP_PROMETHEUS_ENABLED: ${MS365_MCP_PROMETHEUS_ENABLED:-1}
      MS365_MCP_METRICS_PORT: '9464'
      # Public URL allows OAuth redirect + webhook SSRF-safe notificationUrl.
      # Required here so production/reference Compose does not boot with
      # localhost metadata; put local defaults in docker-compose.override.yml.
      MS365_MCP_PUBLIC_URL: ${MS365_MCP_PUBLIC_URL:?MS365_MCP_PUBLIC_URL must be set in .env}
      # Phase 1 SECUR-04: CORS allowlist required in production HTTP mode.
      MS365_MCP_CORS_ORIGINS: ${MS365_MCP_CORS_ORIGINS:?MS365_MCP_CORS_ORIGINS must be set in .env}
      # Phase 3 SECUR-01: Key-encryption-key for AES-GCM envelope encryption
      # of tenant refresh tokens at rest. Generate: openssl rand -base64 32
      MS365_MCP_KEK: '${MS365_MCP_KEK:?MS365_MCP_KEK must be set in .env - generate with openssl rand -base64 32}'
      # Pass through Azure AD app credentials from .env (operator sets these).
      MS365_MCP_CLIENT_ID: ${MS365_MCP_CLIENT_ID:-}
      MS365_MCP_CLIENT_SECRET: ${MS365_MCP_CLIENT_SECRET:-}
      MS365_MCP_TENANT_ID: ${MS365_MCP_TENANT_ID:-common}
    # Command: run in Streamable-HTTP gateway mode on port 3000, org-mode
    # enables Teams/SharePoint/admin scopes. Operators running stdio-only
    # deployments can override this in their own compose.override.yml.
    command: ['--http', '3000', '--org-mode']
    ports:
      - '127.0.0.1:3000:3000' # Streamable HTTP + legacy SSE transports
      - '127.0.0.1:9464:9464' # Prometheus /metrics (Phase 6 plan 06-03)
    healthcheck:
      test: ['CMD', 'node', 'bin/check-health.cjs']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mcp_pg_data:
  mcp_redis_data:
