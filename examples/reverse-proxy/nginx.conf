# Secondary reverse-proxy reference for ms-365-mcp-server v2 (OPS-10).
#
# For operators who prefer nginx over Caddy. TLS certificates are assumed
# to be supplied externally (e.g. via certbot or a cloud load balancer).
# Upstream contract matches examples/docker-compose/docker-compose.yml —
# 127.0.0.1:3000 for MCP + OAuth, 127.0.0.1:9464 for Prometheus metrics.
#
# Key correctness bits:
#   - `proxy_buffering off` on /mcp — SSE streams MUST pass through in
#     real time; nginx's default buffering would delay MCP notifications.
#   - `proxy_http_version 1.1` + `proxy_set_header Connection ""` — keeps
#     the upstream keepalive pool working; otherwise every MCP request
#     opens a new TCP connection.
#   - `proxy_set_header X-Forwarded-Proto $scheme` — src/server.ts trusts
#     this header (app.set('trust proxy', true)) to emit correctly-scoped
#     OAuth issuer URLs.

upstream ms365_mcp {
  server 127.0.0.1:3000;
  keepalive 16;
}

upstream ms365_mcp_metrics {
  server 127.0.0.1:9464;
}

server {
  listen 443 ssl http2;
  server_name mcp.example.com;

  # Replace with your actual cert paths (certbot / lego / cloud-issued).
  ssl_certificate     /etc/ssl/certs/mcp.example.com.pem;
  ssl_certificate_key /etc/ssl/private/mcp.example.com.key;

  # Modern TLS baseline (Mozilla intermediate as of 2026):
  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache         shared:SSL:10m;
  ssl_session_timeout       1d;

  # Admin endpoints belong on admin.example.com with stricter ACL/SSO.
  location ^~ /admin {
    return 404;
  }

  # Tenant-scoped v2 MCP/OAuth/webhook routes.
  location /t/ {
    proxy_pass http://ms365_mcp;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;

    proxy_buffering      off;
    proxy_cache          off;
    proxy_read_timeout   1h;
    proxy_send_timeout   1h;
  }

  # Legacy MCP (Streamable HTTP + legacy SSE shim).
  #
  # SSE requirements: disable proxy buffering so notifications flush to
  # the client as they are written. Raise read/send timeouts so long-lived
  # streams are not killed during idle periods.
  location /mcp {
    proxy_pass http://ms365_mcp;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;

    proxy_buffering      off;
    proxy_cache          off;
    proxy_read_timeout   1h;
    proxy_send_timeout   1h;
  }

  # OAuth 2.1 proxy surface — straight forwarding with preserved headers.
  # The regex covers authorize / token / register / .well-known/*.
  location ~ ^/(authorize|token|register|\.well-known/) {
    proxy_pass http://ms365_mcp;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;
  }

  # Health probes — no auth, no logging (keeps access log from filling
  # with the 2880+ probes/day Docker HEALTHCHECK generates).
  location ~ ^/(healthz|readyz)$ {
    proxy_pass http://ms365_mcp;
    access_log off;
  }

  # Metrics are private by default. Publish them on a separate hostname with
  # auth/IP allowlist after setting MS365_MCP_METRICS_BEARER.
  location /metrics {
    return 404;
  }
}
